<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="theme-color" content="#ffffff"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Pootatoes"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <title>Pootatoes</title>
  <style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
:root{--ink:#1a1a1a;--ink2:#666;--ink3:#aaa;--bg:#fff;--bg2:#f5f5f5;--bg3:#ebebeb;--border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.2);--r:12px;--rl:18px;--acc:#1a1a1a;--acc2:#f0f0f0;}
@media(prefers-color-scheme:dark){:root{--ink:#f2f2f7;--ink2:#aeaeb2;--ink3:#636366;--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);--acc:#f2f2f7;--acc2:#2c2c2e;}}
#app{height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto;background:var(--bg);position:relative;overflow:hidden;}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:82px;}
.navbar{position:absolute;bottom:0;left:0;right:0;background:var(--bg);border-top:0.5px solid var(--border);display:flex;align-items:center;padding:8px 0 max(10px,env(safe-area-inset-bottom));z-index:100;}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;color:var(--ink3);font-size:10px;user-select:none;}
.ni.active{color:var(--acc);}
.ni svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.fab-wrap{flex:0.8;display:flex;justify-content:center;}
.fab{width:50px;height:50px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;cursor:pointer;margin-top:-18px;border:3px solid var(--bg);}
.fab svg{width:22px;height:22px;stroke:var(--bg);fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
.ph{padding:16px 16px 10px;}
.ph-title{font-size:24px;font-weight:700;color:var(--ink);}
.ph-sub{font-size:13px;color:var(--ink2);margin-top:2px;}
.ph-row{display:flex;align-items:center;justify-content:space-between;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#f59e0b;}
.card-list{padding:4px 14px 10px;}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:13px;margin-bottom:9px;display:flex;gap:11px;align-items:flex-start;cursor:pointer;}
.card:active{background:var(--bg2);}
.card-ebox{width:44px;height:44px;border-radius:13px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.card-info{flex:1;min-width:0;}
.card-title{font-size:15px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-date{font-size:12px;color:var(--ink2);margin:2px 0 6px;}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;}
.tag{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:500;}
.tag-place{background:#E6F1FB;color:#0C447C;}
.tag-act{background:#EAF3DE;color:#27500A;}
.card-pin{color:var(--ink3);flex-shrink:0;margin-top:2px;}
.card-pin svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;}
.photo-strip{display:flex;gap:5px;margin-top:7px;}
.photo-strip img{width:58px;height:58px;border-radius:8px;object-fit:cover;}
.empty{text-align:center;padding:50px 20px;}
.empty-ico{font-size:44px;margin-bottom:10px;opacity:0.25;}
.empty h3{font-size:16px;font-weight:600;color:var(--ink);margin-bottom:5px;}
.empty p{font-size:13px;color:var(--ink2);line-height:1.5;}
.map-wrap{padding:0 14px;}
#lmap{width:100%;height:280px;border-radius:var(--rl);border:0.5px solid var(--border);z-index:1;}
#dlmap{width:100%;height:170px;z-index:1;}
.dlmap-wrap{margin:0 16px 4px;border-radius:var(--r);overflow:hidden;border:0.5px solid var(--border);}
.map-legend{padding:8px 14px 4px;display:flex;flex-wrap:wrap;gap:7px;}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--ink2);cursor:pointer;}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.top-places{padding:6px 14px;}
.tp-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:0.5px solid var(--border);}
.tp-row:last-child{border-bottom:none;}
.tp-rank{font-size:12px;font-weight:700;color:var(--ink3);width:18px;}
.tp-name{flex:1;font-size:13px;color:var(--ink);}
.tp-cnt{font-size:11px;color:var(--ink2);background:var(--bg2);padding:2px 7px;border-radius:999px;}
.back-row{padding:10px 14px;display:flex;align-items:center;gap:5px;cursor:pointer;color:var(--acc);font-size:14px;}
.back-row svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
.det-hero{padding:14px 16px;border-bottom:0.5px solid var(--border);display:flex;gap:12px;align-items:center;}
.det-ebox{width:56px;height:56px;border-radius:16px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;}
.det-name{font-size:19px;font-weight:700;color:var(--ink);}
.det-date{font-size:12px;color:var(--ink2);margin-top:3px;}
.det-row{padding:11px 16px;border-bottom:0.5px solid var(--border);display:flex;gap:12px;align-items:flex-start;}
.det-ico{color:var(--acc);flex-shrink:0;margin-top:1px;}
.det-ico svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.det-label{font-size:11px;color:var(--ink2);margin-bottom:2px;}
.det-val{font-size:14px;color:var(--ink);line-height:1.5;}
.det-note{padding:14px 16px;font-size:14px;color:var(--ink2);line-height:1.6;font-style:italic;border-bottom:0.5px solid var(--border);}
.det-photos{display:flex;gap:8px;padding:12px 16px;border-bottom:0.5px solid var(--border);flex-wrap:wrap;}
.det-photos img{width:90px;height:90px;border-radius:10px;object-fit:cover;cursor:pointer;}
.det-actions{padding:14px 16px;display:flex;gap:8px;}
.btn{flex:1;border-radius:var(--r);padding:11px;font-size:14px;cursor:pointer;text-align:center;font-weight:500;border:none;display:flex;align-items:center;justify-content:center;gap:5px;}
.btn-pri{background:var(--acc);color:var(--bg);}
.btn-sec{background:var(--bg2);color:var(--ink);}
.btn-dan{background:#FCEBEB;color:#A32D2D;}
.btn:active{opacity:0.75;}
.form-bar{padding:12px 14px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg);}
.form-bar-title{font-size:16px;font-weight:600;color:var(--ink);flex:1;}
.ico-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:9px;border:0.5px solid var(--border);background:transparent;cursor:pointer;color:var(--ink2);}
.ico-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.form-body{padding:12px 14px 90px;}
.fl{font-size:12px;font-weight:500;color:var(--ink2);margin-bottom:4px;}
.fi{width:100%;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:10px 12px;font-size:14px;color:var(--ink);font-family:inherit;margin-bottom:10px;outline:none;}
.fi:focus{border-color:var(--acc);}
.fta{width:100%;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:10px 12px;font-size:14px;color:var(--ink);font-family:inherit;resize:none;min-height:75px;outline:none;}
.fta:focus{border-color:var(--acc);}
.egrid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:12px;}
.eopt{aspect-ratio:1;border-radius:10px;border:2.5px solid transparent;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;background:var(--bg2);}
.eopt.sel{border-color:var(--acc);background:var(--acc2);}
.tag-input-wrap{position:relative;margin-bottom:6px;}
.tag-input-wrap .fi{margin-bottom:0;}
.tag-suggestions{background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--r);overflow:hidden;margin-top:4px;display:none;position:absolute;left:0;right:0;z-index:50;box-shadow:0 4px 16px rgba(0,0,0,.12);}
.tag-sug-item{padding:9px 12px;font-size:13px;color:var(--ink);cursor:pointer;border-bottom:0.5px solid var(--border);}
.tag-sug-item:last-child{border-bottom:none;}
.tag-sug-item:active{background:var(--bg2);}
.selected-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;margin-top:6px;}
.sel-tag{display:flex;align-items:center;gap:4px;font-size:12px;padding:3px 9px;border-radius:999px;background:var(--bg2);color:var(--ink);border:0.5px solid var(--border2);}
.sel-tag-x{cursor:pointer;color:var(--ink3);font-size:14px;line-height:1;}
.photo-upload-row{display:flex;gap:8px;margin-bottom:10px;}
.photo-slot{width:80px;height:80px;border-radius:10px;border:1.5px dashed var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;background:var(--bg2);flex-shrink:0;}
.photo-slot img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-slot input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.photo-slot-ico{font-size:22px;pointer-events:none;}
.photo-slot-rm{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;}
.place-results{background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--r);overflow:hidden;margin-top:-8px;margin-bottom:10px;display:none;}
.place-result-item{padding:9px 12px;font-size:13px;color:var(--ink);cursor:pointer;border-bottom:0.5px solid var(--border);}
.place-result-item:last-child{border-bottom:none;}
.place-result-item:active{background:var(--bg2);}
.pri-name{font-weight:500;}
.pri-addr{font-size:11px;color:var(--ink2);margin-top:1px;}
.loc-btn{width:100%;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r);padding:10px;font-size:13px;color:var(--ink2);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:10px;}
.coord-row{display:flex;gap:7px;margin-bottom:4px;}
.coord-row .fi{margin-bottom:0;flex:1;}
.coord-hint{font-size:11px;color:var(--ink3);margin-bottom:10px;margin-top:4px;}
.save-btn{width:100%;background:var(--acc);border:none;border-radius:var(--rl);padding:14px;font-size:15px;font-weight:600;color:var(--bg);cursor:pointer;margin-top:5px;font-family:inherit;}
.save-btn:active{opacity:0.85;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:12px 14px;}
.sc{border-radius:14px;padding:14px;cursor:pointer;border:2px solid transparent;}
.sc.open{border-color:var(--acc);}
.sc-ico{font-size:20px;margin-bottom:6px;}
.sc-val{font-size:24px;font-weight:700;margin-bottom:2px;}
.sc-lbl{font-size:11px;font-weight:500;opacity:0.75;}
.sdet{background:var(--bg2);border-radius:var(--rl);margin:0 14px 12px;padding:12px;display:none;}
.sdet.open{display:block;}
.sdet-item{padding:7px 0;border-bottom:0.5px solid var(--border);display:flex;gap:8px;align-items:center;cursor:pointer;}
.sdet-item:last-child{border-bottom:none;}
.sdet-emoji{font-size:18px;width:28px;text-align:center;}
.sdet-info{flex:1;min-width:0;}
.sdet-title{font-size:13px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sdet-date{font-size:11px;color:var(--ink2);}
.sec-block{padding:0 14px 14px;}
.sec-title{font-size:13px;font-weight:600;color:var(--ink2);margin-bottom:8px;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.bar-lbl{font-size:12px;color:var(--ink2);width:52px;flex-shrink:0;}
.bar-track{flex:1;background:var(--bg2);border-radius:4px;height:7px;overflow:hidden;}
.bar-fill{background:var(--acc);height:100%;border-radius:4px;}
.bar-cnt{font-size:11px;color:var(--ink2);width:16px;text-align:right;}
.chip-wrap{display:flex;flex-wrap:wrap;gap:5px;}
.month-box{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);margin:0 14px 14px;padding:13px;}
.month-box-title{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:9px;}
.month-row{display:flex;gap:7px;align-items:flex-start;margin-bottom:7px;font-size:13px;color:var(--ink2);line-height:1.5;}
.month-dot{width:5px;height:5px;border-radius:50%;background:var(--acc);flex-shrink:0;margin-top:6px;}
.more-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:6px 14px 14px;}
.more-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:16px 14px;cursor:pointer;display:flex;flex-direction:column;gap:6px;}
.more-card:active{background:var(--bg2);}
.more-ico{font-size:26px;}
.more-title{font-size:13px;font-weight:600;color:var(--ink);}
.more-sub{font-size:11px;color:var(--ink2);line-height:1.4;}
.list-feat-wrap{padding:6px 14px 10px;}
.list-add-row{display:flex;gap:7px;padding:4px 0 10px;}
.list-add-input{flex:1;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:10px 12px;font-size:14px;color:var(--ink);font-family:inherit;outline:none;}
.list-add-input:focus{border-color:var(--acc);}
.list-add-btn{background:var(--acc);border:none;border-radius:var(--r);padding:10px 14px;font-size:13px;font-weight:600;color:var(--bg);cursor:pointer;font-family:inherit;}
.list-sec-title{font-size:12px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;padding:6px 0 5px;}
.list-item{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:13px;margin-bottom:7px;display:flex;gap:10px;align-items:center;cursor:pointer;}
.list-item:active{background:var(--bg2);}
.list-item.done{opacity:0.5;}
.list-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;}
.list-check.chk{background:var(--acc);border-color:var(--acc);color:var(--bg);}
.list-text{flex:1;font-size:14px;color:var(--ink);}
.list-item.done .list-text{text-decoration:line-through;color:var(--ink3);}
.list-del{background:transparent;border:none;color:var(--ink3);font-size:17px;cursor:pointer;padding:0 2px;flex-shrink:0;}
.cd-add-form{background:var(--bg2);border-radius:var(--rl);padding:14px;margin-bottom:10px;}
.cd-add-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:10px;}
.cd-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:14px;margin-bottom:9px;}
.cd-days{font-size:32px;font-weight:700;color:var(--acc);margin:6px 0 2px;}
.cd-days-lbl{font-size:12px;color:var(--ink2);}
.trip-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:14px;margin-bottom:9px;}
.trip-name{font-size:15px;font-weight:600;color:var(--ink);}
.trip-dates{font-size:12px;color:var(--ink2);margin:2px 0 6px;}
.budget-summary{background:var(--bg2);border-radius:var(--rl);padding:14px;margin-bottom:12px;display:flex;gap:10px;}
.budget-stat{flex:1;text-align:center;}
.budget-stat-val{font-size:20px;font-weight:700;color:var(--ink);}
.budget-stat-lbl{font-size:11px;color:var(--ink2);margin-top:2px;}
.budget-item{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:12px 13px;margin-bottom:7px;display:flex;align-items:center;gap:10px;}
.budget-item-desc{flex:1;font-size:14px;color:var(--ink);}
.budget-item-amt{font-size:15px;font-weight:600;color:var(--ink);}
.budget-item-del{background:transparent;border:none;color:var(--ink3);font-size:17px;cursor:pointer;padding:0 2px;}
.jar-reveal{background:var(--bg2);border-radius:var(--rl);padding:20px;text-align:center;margin-bottom:14px;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
.jar-note-text{font-size:15px;color:var(--ink);font-style:italic;line-height:1.6;}
.jar-from{font-size:12px;color:var(--ink2);}
.shake-btn{width:100%;background:var(--acc);border:none;border-radius:var(--rl);padding:13px;font-size:15px;font-weight:600;color:var(--bg);cursor:pointer;font-family:inherit;margin-bottom:14px;}
.song-card{background:var(--bg2);border-radius:var(--rl);padding:16px;text-align:center;margin-bottom:14px;}
.song-note{font-size:36px;margin-bottom:8px;}
.song-title{font-size:17px;font-weight:600;color:var(--ink);}
.song-artist{font-size:13px;color:var(--ink2);margin-top:3px;}
.song-link{display:inline-flex;align-items:center;gap:5px;margin-top:10px;font-size:13px;color:var(--acc);text-decoration:none;}
.notes-ta{width:100%;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rl);padding:14px;font-size:14px;color:var(--ink);font-family:inherit;resize:none;min-height:200px;outline:none;line-height:1.7;}
.notes-ta:focus{border-color:var(--acc);}
.hh-date-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.hh-date-lbl{font-size:13px;font-weight:600;color:var(--ink2);}
.hh-date-input{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:7px 10px;font-size:13px;color:var(--ink);font-family:inherit;outline:none;}
.hh-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.hh-col-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px;text-align:center;}
.hh-ta{width:100%;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:10px;font-size:13px;color:var(--ink);font-family:inherit;resize:none;min-height:140px;outline:none;line-height:1.6;}
.hh-ta:focus{border-color:var(--acc);}
.hh-save-btn{width:100%;background:var(--acc);border:none;border-radius:var(--rl);padding:13px;font-size:15px;font-weight:600;color:var(--bg);cursor:pointer;font-family:inherit;}
.hh-entry{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:9px;}
.hh-entry-date{padding:8px 13px;background:var(--bg2);font-size:12px;font-weight:600;color:var(--ink2);border-bottom:0.5px solid var(--border);}
.hh-entry-cols{display:grid;grid-template-columns:1fr 1fr;}
.hh-entry-col{padding:10px 12px;}
.hh-entry-col:first-child{border-right:0.5px solid var(--border);}
.hh-entry-name{font-size:11px;font-weight:600;color:var(--ink2);margin-bottom:4px;}
.hh-entry-text{font-size:13px;color:var(--ink);line-height:1.5;}
.motd-card{background:var(--bg2);border-radius:var(--rl);padding:18px;text-align:center;margin-bottom:14px;}
.motd-emoji{font-size:40px;margin-bottom:10px;}
.motd-title{font-size:18px;font-weight:700;color:var(--ink);margin-bottom:4px;}
.motd-date{font-size:12px;color:var(--ink2);margin-bottom:10px;}
.motd-note{font-size:14px;color:var(--ink2);font-style:italic;line-height:1.6;}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px;}
.lightbox img{max-width:100%;max-height:90vh;border-radius:10px;object-fit:contain;}
.lightbox-close{position:fixed;top:16px;right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;cursor:pointer;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;}
.leaflet-popup-content-wrapper{border-radius:10px!important;font-family:-apple-system,sans-serif!important;}
.leaflet-popup-content{margin:9px 13px!important;font-size:13px!important;}
  </style>
</head>
<body>
<div id="app">
  <div class="screen" id="screen"><div class="empty"><div class="empty-ico">🥔</div><h3>Loading…</h3></div></div>
  <div class="navbar">
    <div class="ni active" id="ni-home" onclick="go('home')"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Memories</span></div>
    <div class="ni" id="ni-map" onclick="go('map')"><svg viewBox="0 0 24 24"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg><span>Map</span></div>
    <div class="fab-wrap"><div class="fab" onclick="go('add')" role="button" aria-label="Add"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div></div>
    <div class="ni" id="ni-more" onclick="go('more')"><svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="19" cy="12" r="1.5" fill="currentColor" stroke="none"/></svg><span>More</span></div>
    <div class="ni" id="ni-stats" onclick="go('stats')"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>Stats</span></div>
  </div>
</div>
<div id="lightbox-root"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import{getFirestore,collection,doc,onSnapshot,setDoc,deleteDoc}from"https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
const cfg={apiKey:"AIzaSyCT-AEqhz4Uzb6OHOJ6uJc2yXsrhSkiAsk",authDomain:"pootatoes-90fd5.firebaseapp.com",projectId:"pootatoes-90fd5",storageBucket:"pootatoes-90fd5.firebasestorage.app",messagingSenderId:"392605410976",appId:"1:392605410976:web:babc7ce7439ffb4832cbc5"};
const fapp=initializeApp(cfg);const fdb=getFirestore(fapp);
window._db=fdb;window._fs={collection,doc,onSnapshot,setDoc,deleteDoc};
window.dispatchEvent(new Event('db-ready'));
</script>
<script>
const EMOJIS=['🎬','🏔️','🗺️','🏃','🎵','✈️','🍷','🐾','💻','💕'];
const COLORS=['#1a1a1a','#3a3a3a','#5a5a5a','#777','#444','#222','#666','#999','#333','#555'];

let mems=[],wheel=['Dinner date','Movie night','Hiking','Road trip','Cook at home','Picnic'];
let listData={food:[],places:[],goals:[],activities:[]};
let countdowns=[],trips=[],budgetItems=[],jarNotes=[],hhEntries=[];
let ourSong={title:'',artist:'',url:''};
let sharedNotes='';
let page='home',selected=null,form={},formPhotos=[null,null,null],formTags=[],tagInput='';
let mapInst=null,dMapInst=null,srchDebounce=null,openStat=null;
let wheelSpin=false,wheelAngle=0,motdIdx=null,jarShown=null;
let hhDate=new Date().toISOString().slice(0,10);

const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function fmt(d){if(!d)return'';const[y,m,dd]=d.split('-');const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return`${parseInt(dd)} ${mo[m-1]} ${y}`;}
function fmtM(ym){if(!ym)return'';const[y,m]=ym.split('-');const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return`${mo[m-1]} ${y}`;}
function nowYM(){const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;}
function daysUntil(ds){const d=new Date(ds),n=new Date();n.setHours(0,0,0,0);d.setHours(0,0,0,0);return Math.ceil((d-n)/86400000);}
function sd(c){const e=document.getElementById('sync-dot');if(e)e.style.background=c;}

const db=()=>window._db,fs=()=>window._fs;
async function fsSet(col,id,data){try{sd('#f59e0b');await fs().setDoc(fs().doc(db(),col,String(id)),data);sd('#22c55e');}catch(e){sd('#ef4444');}}
async function fsDel(col,id){try{sd('#f59e0b');await fs().deleteDoc(fs().doc(db(),col,String(id)));sd('#22c55e');}catch(e){sd('#ef4444');}}
async function fsShared(id,data){await fsSet('shared',id,data);}

function startSync(){
  const{collection,doc,onSnapshot}=fs();
  onSnapshot(collection(db(),'memories'),snap=>{mems=snap.docs.map(d=>d.data()).sort((a,b)=>b.id-a.id);if(['home','stats'].includes(page))render();sd('#22c55e');},()=>sd('#ef4444'));
  const keys=['wheel','listData','countdowns','trips','budgetItems','jarNotes','hhEntries','ourSong','sharedNotes'];
  keys.forEach(k=>onSnapshot(fs().doc(db(),'shared',k),snap=>{
    if(!snap.exists())return;const d=snap.data();
    if(k==='wheel')wheel=d.items||wheel;
    else if(k==='listData')listData=d.data||listData;
    else if(k==='countdowns')countdowns=d.items||countdowns;
    else if(k==='trips')trips=d.items||trips;
    else if(k==='budgetItems')budgetItems=d.items||budgetItems;
    else if(k==='jarNotes')jarNotes=d.notes||jarNotes;
    else if(k==='hhEntries')hhEntries=d.entries||hhEntries;
    else if(k==='ourSong')ourSong=d;
    else if(k==='sharedNotes')sharedNotes=d.text||'';
    const map={wheel:'wheel',listData:['food','places','goals','activities'],countdowns:'countdown',trips:'trips',budgetItems:'budget',jarNotes:'jar',hhEntries:'hh',ourSong:'song',sharedNotes:'notes'};
    const rp=map[k];if((Array.isArray(rp)&&rp.includes(page))||page===rp)render();
  }));
}
if(window._db)startSync();else window.addEventListener('db-ready',startSync);

function go(p){
  page=p;form={};formPhotos=[null,null,null];formTags=[];tagInput='';openStat=null;
  if(mapInst){mapInst.remove();mapInst=null;}if(dMapInst){dMapInst.remove();dMapInst=null;}
  render();
}
function setNav(p){['home','map','more','stats'].forEach(n=>{const e=document.getElementById('ni-'+n);if(e)e.className='ni'+(n===p?' active':'');});}
function render(){
  const s=document.getElementById('screen');setNav(page);
  const routes={home:rHome,map:rMap,add:rForm,detail:rDetail,stats:rStats,more:rMore,
    wheel:rWheel,food:()=>rList('food','🍜','Food to try'),places:()=>rList('places','📍','Places to go'),
    goals:()=>rList('goals','🎯','Couple goals'),activities:()=>rList('activities','🏃','Activities to do'),
    countdown:rCountdown,trips:rTrip,budget:rBudget,jar:rJar,song:rSong,notes:rNotes,hh:rHH,motd:rMotd};
  (routes[page]||rHome)(s);s.scrollTop=0;
}

const ICO={
  pin:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
  act:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z"/></svg>`,
  back:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`,
  close:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
  edit:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  ext:`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`,
  loc:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M1 12h4M19 12h4"/></svg>`,
  smp:`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
};

function mkMark(col,cnt){
  const b=cnt>1?`<div style="position:absolute;top:-4px;right:-4px;background:#fff;color:${col};font-size:9px;font-weight:800;border-radius:999px;padding:1px 4px;border:1.5px solid ${col};min-width:16px;text-align:center">${cnt}</div>`:'';
  return L.divIcon({className:'',html:`<div style="position:relative;width:26px;height:26px"><div style="width:26px;height:26px;border-radius:50% 50% 50% 0;background:${col};border:2.5px solid #fff;transform:rotate(-45deg)"></div>${b}</div>`,iconSize:[26,26],iconAnchor:[13,26],popupAnchor:[0,-28]});
}

function allTags(){return[...new Set(mems.flatMap(m=>m.tags||[]).filter(Boolean))];}

/* ── Home ── */
function rHome(s){
  s.innerHTML=`
    <div class="ph ph-row">
      <div><div class="ph-title">Pootatoes 🥔</div><div class="ph-sub">${mems.length} memor${mems.length!==1?'ies':'y'} together</div></div>
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink3)"><div id="sync-dot" class="sync-dot"></div>Sync</div>
    </div>
    <div class="card-list">${mems.length?mems.map(m=>`
      <div class="card" onclick="openDet(${m.id})">
        <div class="card-ebox">${m.emoji||'💕'}</div>
        <div class="card-info">
          <div class="card-title">${esc(m.title)}</div>
          <div class="card-date">${fmt(m.date)}</div>
          <div class="card-tags">
            ${m.place?`<span class="tag tag-place">${esc(m.place)}</span>`:''}
            ${(m.tags||[]).map(t=>`<span class="tag tag-act">${esc(t)}</span>`).join('')}
          </div>
          ${m.photos&&m.photos.filter(Boolean).length?`<div class="photo-strip">${m.photos.filter(Boolean).map(p=>`<img src="${p}" alt=""/>`).join('')}</div>`:''}
        </div>
        ${m.lat?`<div class="card-pin">${ICO.smp}</div>`:''}
      </div>`).join('')
    :`<div class="empty"><div class="empty-ico">💕</div><h3>No memories yet</h3><p>Tap + to add your first memory together.</p></div>`}</div>`;}

/* ── Map ── */
function rMap(s){
  const pinned=mems.filter(m=>m.lat&&m.lng);
  const pcnt={},pname={};
  pinned.forEach(m=>{const k=`${(+m.lat).toFixed(2)},${(+m.lng).toFixed(2)}`;pcnt[k]=(pcnt[k]||0)+1;if(!pname[k])pname[k]=m.place||k;});
  const top=Object.entries(pcnt).sort((a,b)=>b[1]-a[1]).slice(0,5);
  s.innerHTML=`
    <div class="ph"><div class="ph-title">Map</div><div class="ph-sub">${pinned.length} place${pinned.length!==1?'s':''} visited</div></div>
    <div class="map-wrap"><div id="lmap"></div></div>
    ${top.length>1?`<div style="padding:6px 14px 2px;font-size:12px;font-weight:600;color:var(--ink2)">Most visited</div><div class="top-places">${top.map(([k,c],i)=>`<div class="tp-row"><span class="tp-rank">${i+1}</span><span class="tp-name">${esc(pname[k])}</span><span class="tp-cnt">${c}×</span></div>`).join('')}</div>`:''}
    <div class="map-legend">${pinned.map((m,i)=>`<div class="leg-item" onclick="openDet(${m.id})"><span class="leg-dot" style="background:${COLORS[i%COLORS.length]}"></span>${esc(m.title)}</div>`).join('')}</div>`;
  if(!pinned.length)return;
  setTimeout(()=>{
    const el=document.getElementById('lmap');if(!el||!window.L)return;
    const cx=[pinned.reduce((a,m)=>a+(+m.lat),0)/pinned.length,pinned.reduce((a,m)=>a+(+m.lng),0)/pinned.length];
    mapInst=L.map(el,{zoomControl:true,attributionControl:true}).setView(cx,6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© <a href="https://openstreetmap.org">OSM</a>',maxZoom:19}).addTo(mapInst);
    pinned.forEach((m,i)=>{const k=`${(+m.lat).toFixed(2)},${(+m.lng).toFixed(2)}`;const mk=L.marker([+m.lat,+m.lng],{icon:mkMark(COLORS[i%COLORS.length],pcnt[k]||1)}).addTo(mapInst);mk.bindPopup(`<b>${m.emoji} ${m.title}</b><br><small>${fmt(m.date)}</small>${m.place?`<br>${m.place}`:''}`);mk.on('click',()=>mk.openPopup());});
    if(pinned.length>1)mapInst.fitBounds(L.latLngBounds(pinned.map(m=>[+m.lat,+m.lng])),{padding:[40,40]});
  },60);
}

/* ── Detail ── */
function rDetail(s){
  const m=selected;
  const osmUrl=m.lat?`https://www.openstreetmap.org/?mlat=${m.lat}&mlon=${m.lng}&zoom=15`:(m.place?`https://www.openstreetmap.org/search?query=${encodeURIComponent(m.place)}`:'');
  s.innerHTML=`
    <div class="back-row" onclick="go('home')">${ICO.back} Back</div>
    <div class="det-hero"><div class="det-ebox">${m.emoji||'💕'}</div><div><div class="det-name">${esc(m.title)}</div><div class="det-date">${fmt(m.date)}</div></div></div>
    ${m.photos&&m.photos.filter(Boolean).length?`<div class="det-photos">${m.photos.filter(Boolean).map(p=>`<img src="${p}" onclick="showLB('${p}')" alt=""/>`).join('')}</div>`:''}
    ${m.place?`<div class="det-row"><div class="det-ico">${ICO.pin}</div><div><div class="det-label">Place</div><div class="det-val">${esc(m.place)}${m.lat?`<br><small style="color:var(--ink2)">${(+m.lat).toFixed(4)}, ${(+m.lng).toFixed(4)}</small>`:''}</div></div></div>`:''}
    ${m.lat?`<div class="dlmap-wrap"><div id="dlmap"></div></div>`:''}
    ${m.tags&&m.tags.length?`<div class="det-row"><div class="det-ico">${ICO.act}</div><div><div class="det-label">Activities</div><div class="det-val"><div class="card-tags">${m.tags.map(t=>`<span class="tag tag-act">${esc(t)}</span>`).join('')}</div></div></div></div>`:''}
    ${m.note?`<div class="det-note">"${esc(m.note)}"</div>`:''}
    <div class="det-actions">
      <button class="btn btn-dan" onclick="delMem(${m.id})">Delete</button>
      ${osmUrl?`<button class="btn btn-sec" onclick="window.open('${osmUrl}','_blank')">${ICO.ext} Maps</button>`:''}
      <button class="btn btn-sec" onclick="openEdit(${m.id})">${ICO.edit} Edit</button>
    </div>`;
  if(m.lat){setTimeout(()=>{const el=document.getElementById('dlmap');if(!el||!window.L)return;dMapInst=L.map(el,{zoomControl:false,attributionControl:false,dragging:false,scrollWheelZoom:false,doubleClickZoom:false,touchZoom:false}).setView([+m.lat,+m.lng],15);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(dMapInst);L.marker([+m.lat,+m.lng],{icon:mkMark('#1a1a1a',1)}).addTo(dMapInst);},60);}
}

/* ── Form ── */
function rForm(s){
  const ed=form.id!=null;
  s.innerHTML=`
    <div class="form-bar"><button class="ico-btn" onclick="go('home')">${ICO.close}</button><span class="form-bar-title">${ed?'Edit memory':'New memory'}</span></div>
    <div class="form-body">
      <div class="fl">Emoji</div>
      <div class="egrid">${EMOJIS.map(e=>`<div class="eopt${(form.emoji||'💕')===e?' sel':''}" onclick="form.emoji='${e}';render()">${e}</div>`).join('')}</div>
      <div class="fl">Title *</div><input class="fi" id="ft" value="${esc(form.title||'')}" placeholder="e.g. Our first trip" oninput="form.title=this.value"/>
      <div class="fl">Date</div><input class="fi" type="date" id="fd" value="${form.date||''}" oninput="form.date=this.value"/>
      <div class="fl">Photos (up to 3)</div>
      <div class="photo-upload-row">${[0,1,2].map(i=>`<div class="photo-slot" id="pslot-${i}">${formPhotos[i]?`<img src="${formPhotos[i]}" alt=""/><button class="photo-slot-rm" onclick="rmPhoto(${i})">×</button>`:`<input type="file" accept="image/*" onchange="addPhoto(${i},this)"/><span class="photo-slot-ico">📷</span>`}</div>`).join('')}</div>
      <div class="fl">Activities / Tags</div>
      <div class="tag-input-wrap">
        <input class="fi" id="tag-inp" placeholder="Type or pick activity..." autocomplete="off" oninput="onTagInput(this.value)" onkeydown="onTagKey(event)" value="${esc(tagInput)}" style="margin-bottom:0"/>
        <div class="tag-suggestions" id="tag-sugs"></div>
      </div>
      <div class="selected-tags" id="sel-tags">${formTags.map((t,i)=>`<span class="sel-tag">${esc(t)}<span class="sel-tag-x" onclick="rmTag(${i})">×</span></span>`).join('')}</div>
      <div class="fl">Search place</div>
      <input class="fi" id="fp" value="${esc(form.place||'')}" placeholder="Type to search..." autocomplete="off" oninput="onPlaceSearch(this.value)" style="margin-bottom:6px"/>
      <div class="place-results" id="pres"></div>
      <button class="loc-btn" onclick="useMyLoc()">${ICO.loc} Use my location</button>
      <div class="fl">Coordinates</div>
      <div class="coord-row"><input class="fi" id="flat" value="${form.lat||''}" placeholder="Latitude"/><input class="fi" id="flng" value="${form.lng||''}" placeholder="Longitude"/></div>
      <div class="coord-hint">Auto-filled when you pick a place.</div>
      <div class="fl">Notes</div>
      <textarea class="fta" id="fnote" placeholder="Any detail to remember...">${esc(form.note||'')}</textarea>
      <button class="save-btn" onclick="saveMem()">Save memory</button>
    </div>`;
  updateTagSugs('');
}

function onTagInput(v){tagInput=v;updateTagSugs(v);}
function updateTagSugs(v){
  const existing=allTags(),q=v.toLowerCase().trim();
  const sugs=q?existing.filter(t=>t.toLowerCase().includes(q)&&!formTags.includes(t)):existing.filter(t=>!formTags.includes(t));
  const el=document.getElementById('tag-sugs');if(!el)return;
  let html=sugs.map(t=>`<div class="tag-sug-item" onclick="addTag('${esc(t)}')">${esc(t)}</div>`).join('');
  if(q&&!existing.map(t=>t.toLowerCase()).includes(q))html+=`<div class="tag-sug-item" onclick="addTag('${esc(v)}')" style="color:var(--ink2)">+ Add "${esc(v)}"</div>`;
  el.innerHTML=html;el.style.display=html?'block':'none';
}
function onTagKey(e){if(e.key==='Enter'&&tagInput.trim()){e.preventDefault();addTag(tagInput.trim());}}
function addTag(t){
  if(!formTags.includes(t))formTags.push(t);
  tagInput='';const inp=document.getElementById('tag-inp');if(inp)inp.value='';
  const el=document.getElementById('tag-sugs');if(el)el.style.display='none';
  const st=document.getElementById('sel-tags');if(st)st.innerHTML=formTags.map((tt,i)=>`<span class="sel-tag">${esc(tt)}<span class="sel-tag-x" onclick="rmTag(${i})">×</span></span>`).join('');
}
function rmTag(i){formTags.splice(i,1);const st=document.getElementById('sel-tags');if(st)st.innerHTML=formTags.map((t,j)=>`<span class="sel-tag">${esc(t)}<span class="sel-tag-x" onclick="rmTag(${j})">×</span></span>`).join('');}

function addPhoto(i,inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{formPhotos[i]=e.target.result;const sl=document.getElementById(`pslot-${i}`);if(sl)sl.innerHTML=`<img src="${formPhotos[i]}" alt=""/><button class="photo-slot-rm" onclick="rmPhoto(${i})">×</button>`;};r.readAsDataURL(f);}
function rmPhoto(i){formPhotos[i]=null;const sl=document.getElementById(`pslot-${i}`);if(sl)sl.innerHTML=`<input type="file" accept="image/*" onchange="addPhoto(${i},this)"/><span class="photo-slot-ico">📷</span>`;}

function onPlaceSearch(v){
  clearTimeout(srchDebounce);const res=document.getElementById('pres');if(!res)return;
  if(v.trim().length<3){res.style.display='none';return;}
  srchDebounce=setTimeout(async()=>{try{const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(v)}&limit=5`,{headers:{'Accept-Language':'en'}});const data=await r.json();if(!data.length){res.style.display='none';return;}res.innerHTML=data.map(d=>`<div class="place-result-item" onclick="pickPlace('${esc(d.display_name)}',${d.lat},${d.lon})"><div class="pri-name">${esc(d.display_name.split(',')[0])}</div><div class="pri-addr">${esc(d.display_name.split(',').slice(1,3).join(',').trim())}</div></div>`).join('');res.style.display='block';}catch(e){res.style.display='none';}},400);
}
function pickPlace(name,lat,lng){
  const sn=name.split(',')[0].trim();form.place=sn;form.lat=parseFloat((+lat).toFixed(6));form.lng=parseFloat((+lng).toFixed(6));
  const fp=document.getElementById('fp'),fl=document.getElementById('flat'),fn=document.getElementById('flng'),pr=document.getElementById('pres');
  if(fp)fp.value=sn;if(fl)fl.value=form.lat;if(fn)fn.value=form.lng;if(pr)pr.style.display='none';
}
async function useMyLoc(){
  if(!navigator.geolocation){alert('Geolocation not supported.');return;}
  navigator.geolocation.getCurrentPosition(async p=>{

/* ── Wheel ── */
const GCOLS=['#1a1a1a','#3a3a3a','#5a5a5a','#777','#444','#222','#666','#999','#333','#555'];
function rWheel(s){
  s.innerHTML=`
    <div class="back-row" onclick="go('more')">${ICO.back} Back</div>
    <div class="ph" style="padding-top:4px"><div class="ph-title">Spin the wheel 🎡</div></div>
    <div style="padding:0 14px">
      <div style="display:flex;justify-content:center;position:relative;margin-bottom:14px">
        <div style="position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:9px solid transparent;border-right:9px solid transparent;border-top:18px solid var(--acc);z-index:10"></div>
        <canvas id="wc" width="270" height="270" style="border-radius:50%;border:3px solid var(--border2)"></canvas>
      </div>
      <div id="wres" style="display:none;text-align:center;padding:12px;background:var(--bg2);border-radius:var(--rl);margin-bottom:12px;font-size:17px;font-weight:600;color:var(--ink)"></div>
      <button id="spin-btn" onclick="doSpin()" style="width:100%;background:var(--acc);border:none;border-radius:var(--rl);padding:13px;font-size:15px;font-weight:600;color:var(--bg);cursor:pointer;font-family:inherit;margin-bottom:14px">Spin!</button>
      <div style="font-size:13px;font-weight:600;color:var(--ink2);margin-bottom:8px">Options</div>
      <div id="witems"></div>
      <button onclick="addWItem()" style="width:100%;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r);padding:10px;font-size:13px;color:var(--ink2);cursor:pointer;font-family:inherit">+ Add option</button>
    </div>`;
  rWItems();drawWheel();
}
function rWItems(){const el=document.getElementById('witems');if(!el)return;el.innerHTML=wheel.map((it,i)=>`<div style="display:flex;gap:7px;align-items:center;margin-bottom:7px"><input style="flex:1;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:9px 11px;font-size:13px;color:var(--ink);font-family:inherit;outline:none" value="${esc(it)}" oninput="wheel[${i}]=this.value;drawWheel();clearTimeout(window._wt);window._wt=setTimeout(()=>fsShared('wheel',{items:wheel}),800)"/><button onclick="rmWItem(${i})" style="width:30px;height:30px;border-radius:7px;border:0.5px solid var(--border);background:transparent;color:var(--ink3);cursor:pointer;font-size:16px">×</button></div>`).join('');}
function addWItem(){wheel.push('');fsShared('wheel',{items:wheel});rWheel(document.getElementById('screen'));setTimeout(()=>{const ins=document.querySelectorAll('#witems input');if(ins.length)ins[ins.length-1].focus();},60);}
function rmWItem(i){if(wheel.length<=2){alert('Need at least 2!');return;}wheel.splice(i,1);fsShared('wheel',{items:wheel});rWheel(document.getElementById('screen'));}
function drawWheel(hi=-1){
  const c=document.getElementById('wc');if(!c)return;
  const ctx=c.getContext('2d'),cx=135,cy=135,r=128,n=wheel.length,sl=(2*Math.PI)/n;
  ctx.clearRect(0,0,270,270);
  wheel.forEach((it,i)=>{const st=wheelAngle+i*sl-Math.PI/2,en=st+sl;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,st,en);ctx.closePath();ctx.fillStyle=i===hi?'#fff':GCOLS[i%GCOLS.length];ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();ctx.save();ctx.translate(cx,cy);ctx.rotate(st+sl/2);ctx.textAlign='right';ctx.fillStyle=i===hi?'#1a1a1a':'#fff';ctx.font=`${Math.min(12,Math.max(8,110/n))}px -apple-system,sans-serif`;ctx.fillText(it.length>13?it.slice(0,12)+'…':it,r-8,4);ctx.restore();});
  ctx.beginPath();ctx.arc(cx,cy,16,0,2*Math.PI);ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle='#ddd';ctx.lineWidth=1.5;ctx.stroke();
}
function doSpin(){
  if(wheelSpin||wheel.filter(i=>i.trim()).length<2)return;
  wheelSpin=true;document.getElementById('spin-btn').disabled=true;
  const res=document.getElementById('wres');if(res)res.style.display='none';
  const extra=5+Math.random()*5,target=wheelAngle+extra*2*Math.PI+Math.random()*2*Math.PI,dur=3000+Math.random()*1000,start=performance.now(),sa=wheelAngle;
  function anim(now){const p=Math.min((now-start)/dur,1),ease=1-Math.pow(1-p,4);wheelAngle=sa+(target-sa)*ease;drawWheel();if(p<1){requestAnimationFrame(anim);}else{wheelAngle=target%(2*Math.PI);const n=wheel.length,sl=2*Math.PI/n,norm=(((-wheelAngle%(2*Math.PI))+2*Math.PI)%(2*Math.PI)),idx=Math.floor(norm/sl)%n;drawWheel(idx);wheelSpin=false;document.getElementById('spin-btn').disabled=false;const r=document.getElementById('wres');if(r){r.textContent=`🎉 ${wheel[idx]||wheel[0]}!`;r.style.display='block';}}}
  requestAnimationFrame(anim);
}

      </div>
    </div>`;}
function saveSong(){ourSong={title:document.getElementById('stitle')?.value.trim()||'',artist:document.getElementById('sartist')?.value.trim()||'',url:document.getElementById('surl')?.value.trim()||''};fsShared('ourSong',ourSong);rSong(document.getElementById('screen'));}

/* ── Notes ── */
function rNotes(s){
  s.innerHTML=`
    <div class="back-row" onclick="go('more')">${ICO.back} Back</div>
    <div class="ph" style="padding-top:4px"><div class="ph-title">📝 Shared notes</div></div>
    <div style="padding:0 14px">
      <textarea class="notes-ta" id="notes-ta" placeholder="Restaurants to try, movies watchlist, gift ideas...">${esc(sharedNotes)}</textarea>
      <button class="save-btn" onclick="saveNotes()" style="margin-top:8px">Save notes</button>
    </div>`;}
function saveNotes(){sharedNotes=document.getElementById('notes-ta')?.value||'';fsShared('sharedNotes',{text:sharedNotes});const btn=document.querySelector('.save-btn');if(btn){btn.textContent='Saved ✓';setTimeout(()=>{if(btn)btn.textContent='Save notes';},1500);}}

/* ── His & Hers ── */
function rHH(s){
  const entry=hhEntries.find(e=>e.date===hhDate)||{};
  s.innerHTML=`
    <div class="back-row" onclick="go('more')">${ICO.back} Back</div>
    <div class="ph" style="padding-top:4px"><div class="ph-title">👫 His & Hers</div></div>
    <div style="padding:0 14px">
      <div class="hh-date-row"><span class="hh-date-lbl">Date</span><input class="hh-date-input" type="date" value="${hhDate}" onchange="hhDate=this.value;rHH(document.getElementById('screen'))"/></div>
      <div class="hh-cols"><div><div class="hh-col-title">His 👦</div><textarea class="hh-ta" id="hh-his" placeholder="His day...">${esc(entry.his||'')}</textarea></div><div><div class="hh-col-title">Hers 👧</div><textarea class="hh-ta" id="hh-her" placeholder="Her day...">${esc(entry.her||'')}</textarea></div></div>
      <button class="hh-save-btn" onclick="saveHH()">Save entry</button>
      <div style="margin-top:16px;font-size:13px;font-weight:600;color:var(--ink2);margin-bottom:8px">Past entries</div>
      ${hhEntries.sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10).map(e=>`<div class="hh-entry" onclick="hhDate='${e.date}';rHH(document.getElementById('screen'))"><div class="hh-entry-date">${fmt(e.date)}</div><div class="hh-entry-cols"><div class="hh-entry-col"><div class="hh-entry-name">His 👦</div><div class="hh-entry-text">${esc(e.his||'—')}</div></div><div class="hh-entry-col"><div class="hh-entry-name">Hers 👧</div><div class="hh-entry-text">${esc(e.her||'—')}</div></div></div></div>`).join('')}
    </div>`;}
function saveHH(){const his=document.getElementById('hh-his')?.value||'',her=document.getElementById('hh-her')?.value||'';const idx=hhEntries.findIndex(e=>e.date===hhDate);if(idx>=0)hhEntries[idx]={date:hhDate,his,her};else hhEntries.push({date:hhDate,his,her});fsShared('hhEntries',{entries:hhEntries});const btn=document.querySelector('.hh-save-btn');if(btn){btn.textContent='Saved ✓';setTimeout(()=>{if(btn)btn.textContent='Save entry';},1500);}}

/* ── Memory of the day ── */
function rMotd(s){
  if(motdIdx===null&&mems.length)motdIdx=Math.floor(Math.random()*mems.length);
  const m=mems.length?mems[motdIdx%mems.length]:null;
  s.innerHTML=`
    <div class="back-row" onclick="go('more')">${ICO.back} Back</div>
    <div class="ph" style="padding-top:4px"><div class="ph-title">🌅 Memory of the day</div></div>
    <div style="padding:0 14px">
      ${m?`<div class="motd-card"><div class="motd-emoji">${m.emoji||'💕'}</div><div class="motd-title">${esc(m.title)}</div><div class="motd-date">${fmt(m.date)}</div>${m.place?`<div style="font-size:13px;color:var(--ink);margin-bottom:8px">📍 ${esc(m.place)}</div>`:''} ${m.note?`<div class="motd-note">"${esc(m.note)}"</div>`:''} ${m.photos&&m.photos.filter(Boolean).length?`<img src="${m.photos.filter(Boolean)[0]}" style="width:100%;border-radius:10px;margin-top:12px;object-fit:cover;max-height:180px" alt=""/>`:''}</div><button class="save-btn" style="margin-bottom:8px" onclick="openDet(${m.id})">View full memory</button><button onclick="motdIdx=Math.floor(Math.random()*mems.length);rMotd(document.getElementById('screen'))" style="width:100%;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--rl);padding:12px;font-size:14px;color:var(--ink2);cursor:pointer;font-family:inherit">🔀 Show another memory</button>`:`<div class="empty"><div class="empty-ico">🌅</div><h3>No memories yet</h3><p>Add memories to see them here!</p></div>`}
    </div>`;}

/* ── Lightbox ── */
function showLB(src){document.getElementById('lightbox-root').innerHTML=`<div class="lightbox" onclick="closeLB()"><img src="${src}" alt=""/><button class="lightbox-close" onclick="closeLB()">×</button></div>`;}
function closeLB(){document.getElementById('lightbox-root').innerHTML='';}

/* ── CRUD ── */
function openDet(id){selected=mems.find(m=>m.id===id||m.id===Number(id));if(!selected)return;page='detail';if(mapInst){mapInst.remove();mapInst=null;}render();}
function openEdit(id){
  const m=mems.find(x=>x.id===id||x.id===Number(id));if(!m)return;
  form={...m};formPhotos=[...(m.photos||[])];while(formPhotos.length<3)formPhotos.push(null);
  formTags=[...(m.tags||[])];page='add';render();
}
function delMem(id){if(!confirm('Remove this memory?'))return;fsDel('memories',String(id));go('home');}
function saveMem(){
  const title=(document.getElementById('ft')?.value||'').trim();if(!title){alert('Please add a title.');return;}
  const lat=parseFloat(document.getElementById('flat')?.value),lng=parseFloat(document.getElementById('flng')?.value);
  const tags=[...new Set(formTags.filter(Boolean))];
  const photos=formPhotos.filter(Boolean);
  const mem={...form,title,date:document.getElementById('fd')?.value||'',place:document.getElementById('fp')?.value||form.place||'',lat:isNaN(lat)?null:lat,lng:isNaN(lng)?null:lng,tags,photos,note:document.getElementById('fnote')?.value||'',emoji:form.emoji||'💕'};
  if(!mem.id)mem.id=Date.now();
  fsSet('memories',String(mem.id),mem);go('home');
}

if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
</script>
</body>
</html>
